<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSEB 10th Study Hero</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <style>
        .active-tab { color: #ea580c; border-top: 4px solid #ea580c; background: #fff7ed; }
        body { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer, Cell } = Recharts;

        function App() {
            const [tab, setTab] = useState('ai');
            const [input, setInput] = useState('');
            const [response, setResponse] = useState('');
            const [loading, setLoading] = useState(false);
            const [showSettings, setShowSettings] = useState(false);
            
            // App Data
            const [apiKey, setApiKey] = useState(localStorage.getItem('gseb_key') || '');
            const [marks, setMarks] = useState(() => {
                const saved = localStorage.getItem('gseb_marks');
                return saved ? JSON.parse(saved) : [
                    { subject: 'Maths', score: 80 },
                    { subject: 'Science', score: 75 },
                    { subject: 'S.S.', score: 85 },
                    { subject: 'English', score: 90 },
                    { subject: 'Guj/Hin', score: 70 }
                ];
            });

            useEffect(() => { localStorage.setItem('gseb_marks', JSON.stringify(marks)); }, [marks]);
            useEffect(() => { localStorage.setItem('gseb_key', apiKey); }, [apiKey]);

            const askAI = async () => {
                if (!apiKey) { setShowSettings(true); return; }
                setLoading(true);
                try {
                    const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                        method: "POST",
                        headers: { "Authorization": `Bearer ${apiKey}`, "Content-Type": "application/json" },
                        body: JSON.stringify({
                            model: "llama3-8b-8192",
                            messages: [
                                { role: "system", content: "You are a GSEB 10th grade expert. Answer questions based on Gujarat Board syllabus in simple terms." },
                                { role: "user", content: input }
                            ]
                        })
                    });
                    const data = await res.json();
                    setResponse(data.choices[0].message.content);
                } catch (e) { setResponse("Error: Please check your API key in settings."); }
                setLoading(false);
            };

            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col relative">
                    {/* Header */}
                    <header className="bg-orange-600 text-white p-4 shadow-md flex justify-between items-center">
                        <h1 className="font-black text-xl italic tracking-tighter">GSEB HERO</h1>
                        <button onClick={() => setShowSettings(!showSettings)} className="text-xs bg-orange-700 px-2 py-1 rounded">⚙️ API KEY</button>
                    </header>

                    {/* Settings Overlay */}
                    {showSettings && (
                        <div className="p-4 bg-orange-100 border-b border-orange-200 animate-pulse">
                            <p className="text-xs font-bold text-orange-800 mb-1">Enter Groq API Key:</p>
                            <input 
                                type="password" value={apiKey} 
                                onChange={(e) => setApiKey(e.target.value)}
                                className="w-full p-2 rounded border border-orange-300 text-sm mb-2"
                                placeholder="gsk_..."
                            />
                            <button onClick={() => setShowSettings(false)} className="bg-orange-600 text-white px-4 py-1 rounded text-xs">Save & Close</button>
                        </div>
                    )}

                    <main className="flex-1 p-4 mb-20">
                        {tab === 'ai' ? (
                            <div className="space-y-4">
                                <div className="bg-white p-4 rounded-2xl shadow-sm border border-orange-100">
                                    <h2 className="font-bold text-slate-800 mb-2">GSEB AI Doubt Solver</h2>
                                    <textarea 
                                        className="w-full p-4 bg-slate-50 border rounded-xl h-32 text-sm"
                                        placeholder="Type your question or 'Make a 5 mark test for Science Ch 1'..."
                                        value={input} onChange={(e) => setInput(e.target.value)}
                                    />
                                    <button onClick={askAI} disabled={loading} className="w-full mt-2 bg-orange-600 text-white py-4 rounded-xl font-bold shadow-lg active:scale-95 transition">
                                        {loading ? "AI is Thinking..." : "ASK AI TUTOR"}
                                    </button>
                                </div>
                                {response && (
                                    <div className="bg-slate-800 text-white p-5 rounded-2xl text-sm leading-relaxed whitespace-pre-wrap shadow-xl border-t-4 border-orange-500">
                                        {response}
                                    </div>
                                )}
                            </div>
                        ) : (
                            <div className="space-y-4">
                                <div className="bg-white p-4 rounded-2xl shadow-sm border h-64">
                                    <h3 className="font-bold text-slate-700 mb-4">Preparation Level</h3>
                                    <ResponsiveContainer width="100%" height="100%">
                                        <BarChart data={marks}>
                                            <XAxis dataKey="subject" fontSize={10} axisLine={false} tickLine={false}/>
                                            <Tooltip cursor={{fill: '#fff7ed'}} />
                                            <Bar dataKey="score" radius={[5, 5, 0, 0]}>
                                                {marks.map((e, i) => <Cell key={i} fill={e.score > 80 ? '#16a34a' : '#ea580c'} />)}
                                            </Bar>
                                        </BarChart>
                                    </ResponsiveContainer>
                                </div>
                                <div className="grid gap-2">
                                    {marks.map((m, i) => (
                                        <div key={m.subject} className="bg-white p-4 rounded-xl flex justify-between items-center border shadow-sm">
                                            <span className="font-bold text-slate-600">{m.subject}</span>
                                            <div className="flex items-center gap-2">
                                                <input 
                                                    type="number" value={m.score} 
                                                    onChange={(e) => {
                                                        const nm = [...marks];
                                                        nm[i].score = parseInt(e.target.value) || 0;
                                                        setMarks(nm);
                                                    }}
                                                    className="w-12 text-center font-bold text-orange-600 border-b-2 border-orange-200 outline-none"
                                                />
                                                <span className="text-xs text-slate-400">/100</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Navigation */}
                    <nav className="fixed bottom-0 w-full max-w-md bg-white border-t flex shadow-2xl">
                        <button onClick={() => setTab('ai')} className={`flex-1 py-4 font-bold text-xs uppercase tracking-widest ${tab === 'ai' ? 'active-tab' : 'text-slate-400'}`}>
                            Tutor
                        </button>
                        <button onClick={() => setTab('marks')} className={`flex-1 py-4 font-bold text-xs uppercase tracking-widest ${tab === 'marks' ? 'active-tab' : 'text-slate-400'}`}>
                            Grades
                        </button>
                    </nav>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
